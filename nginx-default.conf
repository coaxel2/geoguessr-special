# Geoloc — config nginx (site statique).
# Identique à la config par défaut de nginx:alpine + un en-tête Cache-Control :
# le navigateur revalide toujours les fichiers (etag) → chaque visiteur reçoit
# la dernière version après un redéploiement, sans avoir à vider son cache.
server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        add_header Cache-Control "no-cache" always;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
